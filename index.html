<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR 會議音檔轉 JSON 助手</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loading { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">
    <div class="max-w-xl w-full bg-white rounded-[2rem] shadow-2xl p-8 border border-slate-100">
        <div class="text-center mb-8">
            <div class="text-4xl mb-4">🎤</div>
            <h1 class="text-2xl font-black text-slate-800 tracking-tight">音檔紀錄轉 JSON 服務</h1>
            <p class="text-slate-400 text-sm mt-2">正式環境版 (GitHub Pages)</p>
        </div>

        <div class="mb-6">
            <label class="block text-[10px] font-black text-indigo-500 uppercase tracking-[0.2em] mb-2">Step 1: 填入 API KEY</label>
            <input type="password" id="apiKey" placeholder="在此貼上您的 Gemini API Key" 
                   class="w-full p-4 bg-slate-50 border-2 border-slate-50 rounded-2xl focus:border-indigo-500 focus:bg-white transition-all outline-none text-sm">
        </div>

        <div class="mb-8 p-6 bg-indigo-50 rounded-[1.5rem] border-2 border-indigo-100 border-dashed">
            <label class="block text-[10px] font-black text-indigo-500 uppercase tracking-[0.2em] mb-4 text-center">Step 2: 選取錄音檔</label>
            <input id="audioFile" type="file" accept="audio/*" 
                   class="block w-full text-xs text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-bold file:bg-indigo-600 file:text-white hover:file:bg-indigo-700 cursor-pointer" />
        </div>

        <button onclick="processAudio()" id="runBtn" 
                class="w-full bg-slate-900 text-white font-black py-5 rounded-2xl hover:scale-[1.02] active:scale-[0.98] transition-all shadow-xl disabled:bg-slate-200">
            開始 AI 分析並產出 JSON
        </button>

        <div id="loader" class="hidden mt-8 text-center">
            <p class="loading text-indigo-600 font-black">🚀 正在聽取並轉化資料...</p>
            <p class="text-[10px] text-slate-400 mt-2">初次執行較慢，請稍候約 30 秒</p>
        </div>

        <div id="resultArea" class="hidden mt-8">
            <div class="flex justify-between items-center mb-2">
                <span class="text-[10px] font-black text-slate-400 uppercase">Result JSON</span>
                <button onclick="copyResult()" class="text-[10px] text-indigo-600 font-black">COPY</button>
            </div>
            <pre id="jsonOutput" class="bg-slate-900 text-emerald-400 p-6 rounded-2xl overflow-x-auto text-[11px] font-mono border-4 border-slate-800 max-h-60 shadow-inner"></pre>
        </div>
    </div>

    <script type="module">
        import { GoogleGenAI } from "https://esm.run/@google/generative-ai";

        window.processAudio = async function() {
            const key = document.getElementById('apiKey').value;
            const fileInput = document.getElementById('audioFile');
            const runBtn = document.getElementById('runBtn');
            const loader = document.getElementById('loader');
            const resultArea = document.getElementById('resultArea');
            const jsonOutput = document.getElementById('jsonOutput');

            if (!key) return alert("請輸入 API Key");
            if (!fileInput.files[0]) return alert("請選取檔案");

            runBtn.disabled = true;
            loader.classList.remove('hidden');
            resultArea.classList.add('hidden');

            try {
                const file = fileInput.files[0];
                const base64Data = await new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = () => resolve(reader.result.split(',')[1]);
                    reader.onerror = e => reject(e);
                    reader.readAsDataURL(file);
                });

                const genAI = new GoogleGenAI(key);
                const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });

                const prompt = "你是一位專業秘書。請聽這段錄音，直接以 JSON 格式輸出內容，包含：subject (主題), summary (摘要), tasks (待辦事項)。不要輸出 JSON 以外的任何文字。";

                const result = await model.generateContent([
                    { inlineData: { mimeType: file.type || "audio/mp4", data: base64Data } },
                    { text: prompt }
                ]);

                const text = await result.response.text();
                jsonOutput.innerText = text.replace(/```json|```/g, "").trim();
                resultArea.classList.remove('hidden');
                
            } catch (error) {
                console.error(error);
                alert("❌ 發生錯誤！原因如下：\n" + error.message + "\n\n請檢查 API Key 是否正確或檔案是否過大。");
            } finally {
                runBtn.disabled = false;
                loader.classList.add('hidden');
            }
        };

        window.copyResult = () => {
            navigator.clipboard.writeText(document.getElementById('jsonOutput').innerText);
            alert("已複製！");
        };
    </script>
</body>
</html>
